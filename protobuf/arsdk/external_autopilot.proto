syntax = "proto3";

package arsdk.externalautopilot;

import "parrot/protobuf/extensions.proto";

option java_package = "com.parrot.drone.arsdk.externalautopilot";
option java_outer_classname = "ExternalAutopilot";

option (olympe_package) = "externalautopilot";

// This is the entry point to send messages to the drone
message Command {
    reserved 1 to 15; // reserved for non-acknowledged commands

    oneof id {
        GetState get_state = 16;
    }

    message GetState {
        bool include_default_capabilities = 1;

        option (support) = "0925:8.4";
    }
}

// This is the entry point to receive messages from the drone.
message Event {
    reserved 1 to 15; // reserved for non-acknowledged events

    oneof id {
        State state = 16;
        Log log = 17;
    }

    // Drone capabilities.
    message Capabilities {

        option (support) = "0925:8.4";
    }

    // Log message.
    message Log {
        LogLevel level = 1;
        LogSource source = 2;
        string msg = 3;

        option (support) = "0925:8.4";
    }

    // Drone state.
    message State {
        Capabilities default_capabilities = 1;
        AutopilotFlightMode flight_mode = 2; // Current external flight mode
        bool connected = 3;
    }
}

enum AutopilotFlightMode {
    AUTOPILOT_FLIGHT_MODE_UNKNOWN = 0; // In an unknown mode
    AUTOPILOT_FLIGHT_MODE_STABILIZE = 1; // Self-leveling
    AUTOPILOT_FLIGHT_MODE_TAKEOFF = 2; // In auto-takeoff mode
    AUTOPILOT_FLIGHT_MODE_GUIDED = 3; // Flying towards a target waypoint (may be taking off)
    AUTOPILOT_FLIGHT_MODE_LOITER = 4; // Loitering
    AUTOPILOT_FLIGHT_MODE_MANUAL = 5; // Manual piloting as a copter, receives raw piloting commands
    AUTOPILOT_FLIGHT_MODE_MANUAL_PLANE = 6; // Manual piloting as a plane, receives raw piloting commands
    AUTOPILOT_FLIGHT_MODE_MISSION = 7; // Executing a mission
    AUTOPILOT_FLIGHT_MODE_RTH = 8; // Returning to its home location
    AUTOPILOT_FLIGHT_MODE_LANDING = 9; // Landing
}

enum LogLevel {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
}

enum LogSource {
    CONFIGURATION = 0;
    AUTOPILOT = 1;
}
