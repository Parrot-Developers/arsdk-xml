syntax = "proto3";

package arsdk.piloting;

import "parrot/protobuf/extensions.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

option java_package = "com.parrot.drone.arsdk.piloting";
option java_outer_classname = "Piloting";

option (olympe_package) = "piloting";

// This is the entry point to send messages to the device
message Command {
  reserved 1 to 15; // reserved for non-acknowledged commands

  oneof id {
    google.protobuf.Empty get_state = 16;
    google.protobuf.Empty get_capabilities = 17;
    SetSpeedMode set_speed_mode = 18;
    /* Set the drone takeoff hovering altitude above ground in meters */
    SetTakeoffHoveringAltitude set_takeoff_hovering_altitude = 19;
    /* Set preferred the ATTI mode. Only used in manual piloting mode. */
    AttiMode set_preferred_atti_mode = 20;
    StartFlightMode start_flight_mode = 21;
    SetAssistanceMode set_assistance_mode = 22;
  }

  /* Set the drone speed mode */
  message SetSpeedMode {
    SpeedMode speed_mode = 1;
  }

  message SetTakeoffHoveringAltitude {
    float altitude = 1;
  }

  message StartFlightMode {
     FlightMode value = 1;

     option (support) = "0925:8.4";
  }

  message SetAssistanceMode {
     AssistanceMode value = 1;

     option (support) = "0925:8.4";
  }
}

/* This is the entry point to receive messages from the drone. */
message Event {
  reserved 1 to 15; /* reserved for non-acknowledged events */

  oneof id {
    State state = 16;
    Capabilities capabilities = 17;
  }

  /* Current state. */
  message State {
    SpeedModeValue speed_mode = 1;
    google.protobuf.FloatValue takeoff_hovering_altitude = 2;
    AttiMode preferred_atti_mode = 3;
    AttiMode current_atti_mode = 4;
    AssistanceModeValue assistance_mode = 5;
    TakeoffStateValue takeoff_state = 6;
    VehicleTypeValue vehicle_type = 7;
    VehicleModeValue vehicle_mode = 8;
  }

  message Capabilities {
    /* Capabilities of this feature */
    repeated SpeedMode speed_modes = 1;
    repeated Feature supported_features = 2;
    FloatRange takeoff_hovering_altitude_range = 3;
    repeated FlightMode flight_modes = 4;
    repeated AssistanceMode assistance_modes = 5;
    repeated VehicleMode supported_vehicle_modes = 6;
  }
}

message AttiMode {
  bool enabled = 1;
}

message SpeedModeValue {
  SpeedMode value = 1;
}

message TakeoffStateValue {
  TakeoffState value = 1;

  option (support) = "0925:8.4";
}

message AssistanceModeValue {
  AssistanceMode value = 1;

  option (support) = "0925:8.4";
}

message VehicleModeValue {
  VehicleMode value = 1;

  option (support) = "0925:8.4";
}

message VehicleTypeValue {
  VehicleType value = 1;

  option (support) = "0925:8.4";
}

message FloatRange {
  float min = 1;
  float max = 2;
}

enum SpeedMode {
  NORMAL_SPEED_MODE = 0;
  LOW_SPEED_MODE = 1;
}

enum Feature {
  HAND_LAUNCH = 0;
  ATTI_MODE = 1;
}

// Flight mode
enum FlightMode {
  LOITER = 0;
  MANUAL_COPTER = 1;
  MANUAL_PLANE = 2;
}

// Assistance mode for manual piloting
enum AssistanceMode {
  // Plane will hold the roll and pitch specified.
  ASSISTED_ATTITUDE = 0;

  // Plane will hold the roll, pitch specified, as well as the altitude.
  ASSISTED_ALTITUDE = 1;
}

// Take-off state.
enum TakeoffState {
  // On the ground, waiting to take off.
  IDLE = 0;

  // Arming motors.
  ARMING = 1;

  // Ready to be launched (hand, catapult...).
  READY = 2;

  // Detecting the throw to increase the throttle and validate the takeoff.
  RESCUE = 3;

  // Motors unlocked.
  UNLOCK = 4;

  // Motors in ramping phase.
  RAMPING = 5;

  // Drone is ascending.
  ASCENT = 6;
}

enum VehicleMode {
    VEHICLE_MODE_COPTER = 0;
    VEHICLE_MODE_PLANE = 1;
}

enum VehicleType {
    VEHICLE_TYPE_MULTICOPTER = 0;
    VEHICLE_TYPE_VTOL = 1;
    VEHICLE_TYPE_HELICOPTER = 2;
    VEHICLE_TYPE_PLANE = 3;
}
